<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      background-color: #0b0f19;
      color: rgba(255, 255, 255, 0.6);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top: 2px solid #ffffff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script>
    (function() {
      try {
        const location = window.location;
        const path = location.pathname;
        
        // List of known standard page routes in the router
        const validPageRoutes = ['works', 'about', 'home'];
        
        // Split the pathname into segments
        const segments = path.split('/').filter(Boolean);
        
        // Determine the base path of the application (handles custom domains and GitHub repository subfolders)
        // If we are on GitHub Pages subfolder (e.g. /repository-name/about), the first segment is the repo name.
        // If the first segment is a known route, there is no repository subfolder (hosted on root domain).
        let repoSegment = "";
        let routePath = "";
        
        if (segments.length > 0) {
          const firstSegment = segments[0].toLowerCase();
          const isRepoName = !validPageRoutes.includes(firstSegment) && !firstSegment.startsWith('works');
          
          if (isRepoName) {
            repoSegment = "/" + segments[0];
            routePath = segments.slice(1).join('/');
          } else {
            routePath = segments.join('/');
          }
        }
        
        // Build redirect hash path
        let hashRoute = "#/";
        if (routePath) {
          hashRoute = "#/" + routePath;
        }
        
        // Perform redirect to index.html with the route formatted as a hash
        location.replace(location.origin + repoSegment + "/" + hashRoute);
      } catch (e) {
        window.location.replace('./#/');
      }
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p style="font-size: 0.9rem; letter-spacing: 0.05em;">LOADING PORTFOLIO...</p>
  </div>
</body>
</html>
